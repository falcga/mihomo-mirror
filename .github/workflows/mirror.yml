name: Mirror latest binaries to GitLab Releases

on:
  schedule:
    - cron: '0 6 * * *'   # каждый день в 6:00 UTC
  workflow_dispatch:       # ручной запуск

env:
  GITLAB_TOKEN: ${{ secrets.GITLAB_TOKEN }}
  GITLAB_PROJECT_ID: ${{ secrets.GITLAB_PROJECT_ID }}
  RELEASE_TAG: "mirror-latest"
  # GITHUB_TOKEN автоматически создаётся раннером, передаём его явно
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  mirror:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Download artifacts (mihomo + shell2http)
        run: |
          set -e -o pipefail
          mkdir -p artifacts
          cd artifacts

          # ----- mihomo -----
          echo "=== Downloading mihomo ==="
          MIHOMO_JSON=$(curl -s -H "Authorization: token $GITHUB_TOKEN" \
            https://api.github.com/repos/MetaCubeX/mihomo/releases/latest)
          for ARCH in arm64 amd64 armv7; do
            URL=$(echo "$MIHOMO_JSON" | jq -r ".assets[] | select(.name | test(\"mihomo-linux-$ARCH-.*\\\\.gz\") and (test(\"-go[0-9]+\") | not)) | .browser_download_url")
            if [ -n "$URL" ] && [ "$URL" != "null" ]; then
              echo "Downloading mihomo for $ARCH ..."
              wget -q --show-progress "$URL"
            else
              echo "No valid URL for mihomo $ARCH, skipping"
            fi
          done

          # ----- shell2http -----
          echo "=== Downloading shell2http ==="
          SHELL2HTTP_JSON=$(curl -s -H "Authorization: token $GITHUB_TOKEN" \
            https://api.github.com/repos/msoap/shell2http/releases/latest)
          for ARCH in arm64 amd64 armv6; do
            URL=$(echo "$SHELL2HTTP_JSON" | jq -r ".assets[] | select(.name | test(\"shell2http_.*_linux_$ARCH\\\\.tar\\\\.gz\")) | .browser_download_url")
            if [ -n "$URL" ] && [ "$URL" != "null" ]; then
              echo "Downloading shell2http for $ARCH ..."
              wget -q --show-progress "$URL"
            else
              echo "No valid URL for shell2http $ARCH, skipping"
            fi
          done

          echo "Download completed. Files:"
          ls -la

      - name: Delete existing release (ignore if not exists)
        run: |
          curl -X DELETE -H "PRIVATE-TOKEN: $GITLAB_TOKEN" \
            "https://gitlab.com/api/v4/projects/$GITLAB_PROJECT_ID/releases/$RELEASE_TAG" || true

      - name: Create a new release
        run: |
          curl -X POST -H "PRIVATE-TOKEN: $GITLAB_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{
              \"name\": \"Mirror of mihomo & shell2http\",
              \"tag_name\": \"$RELEASE_TAG\",
              \"description\": \"Automatically mirrored binaries from GitHub releases\nUpdated: $(date -u +'%Y-%m-%d %H:%M:%S UTC')\",
              \"ref\": \"main\"
            }" \
            "https://gitlab.com/api/v4/projects/$GITLAB_PROJECT_ID/releases"

      - name: Upload each artifact as a release asset
        run: |
          for file in artifacts/*; do
            filename=$(basename "$file")
            echo "Uploading $filename ..."
            curl -X POST -H "PRIVATE-TOKEN: $GITLAB_TOKEN" \
              -F "file=@$file" \
              -F "name=$filename" \
              "https://gitlab.com/api/v4/projects/$GITLAB_PROJECT_ID/releases/$RELEASE_TAG/assets?link_type=package"
          done

      - name: Cleanup
        if: always()
        run: rm -rf artifacts
