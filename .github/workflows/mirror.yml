name: Mirror binaries to GitLab Releases (via Generic Packages)

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

env:
  GITLAB_TOKEN: ${{ secrets.GITLAB_TOKEN }}
  GITLAB_PROJECT_ID: ${{ secrets.GITLAB_PROJECT_ID }}
  RELEASE_TAG: "mirror-latest"
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  mirror:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Download artifacts (mihomo + shell2http)
        run: |
          set -e -o pipefail
          mkdir -p artifacts
          cd artifacts

          # ----- mihomo -----
          echo "=== Downloading mihomo ==="
          MIHOMO_JSON=$(curl -s -H "Authorization: token $GITHUB_TOKEN" \
            https://api.github.com/repos/MetaCubeX/mihomo/releases/latest)
          for ARCH in arm64 amd64 armv7; do
            URL=$(echo "$MIHOMO_JSON" | jq -r ".assets[] | select(.name | test(\"mihomo-linux-$ARCH-.*\\\\.gz\") and (test(\"-go\") | not)) | .browser_download_url" | head -1)
            if [ -n "$URL" ] && [ "$URL" != "null" ]; then
              echo "Downloading mihomo for $ARCH from $URL"
              wget -q --show-progress "$URL" || { echo "Failed to download mihomo for $ARCH"; continue; }
            else
              echo "No valid URL for mihomo $ARCH, skipping"
            fi
          done

          # ----- shell2http -----
          echo "=== Downloading shell2http ==="
          SHELL2HTTP_JSON=$(curl -s -H "Authorization: token $GITHUB_TOKEN" \
            https://api.github.com/repos/msoap/shell2http/releases/latest)
          for ARCH in arm64 amd64 armv6; do
            URL=$(echo "$SHELL2HTTP_JSON" | jq -r ".assets[] | select(.name | test(\"shell2http_.*_linux_$ARCH\\\\.tar\\\\.gz\")) | .browser_download_url")
            if [ -n "$URL" ] && [ "$URL" != "null" ]; then
              echo "Downloading shell2http for $ARCH ..."
              wget -q --show-progress "$URL" || { echo "Failed to download shell2http for $ARCH"; continue; }
            else
              echo "No valid URL for shell2http $ARCH, skipping"
            fi
          done

          echo "Download completed. Files:"
          ls -la

      - name: Upload files to GitLab Generic Package Registry
        run: |
          for file in artifacts/*; do
            filename=$(basename "$file")
            # Определяем имя пакета и версию
            if [[ $filename =~ ^mihomo-linux-(arm64|amd64|armv7)-v([0-9.]+)\.gz$ ]]; then
              PACKAGE="mihomo"
              VERSION="v${BASH_REMATCH[2]}"
              ARCH="${BASH_REMATCH[1]}"
            elif [[ $filename =~ ^shell2http_([0-9.]+)_linux_(arm64|amd64|armv6)\.tar\.gz$ ]]; then
              PACKAGE="shell2http"
              VERSION="v${BASH_REMATCH[1]}"
              ARCH="${BASH_REMATCH[2]}"
            else
              echo "Skipping unknown file $filename"
              continue
            fi
            echo "Uploading $filename as $PACKAGE/$VERSION (arch $ARCH)"
            curl --request PUT \
              --header "PRIVATE-TOKEN: $GITLAB_TOKEN" \
              --upload-file "$file" \
              "https://gitlab.com/api/v4/projects/$GITLAB_PROJECT_ID/packages/generic/$PACKAGE/$VERSION/$filename"
            echo ""
          done

      - name: Delete existing release (ignore errors)
        run: |
          curl -X DELETE -H "PRIVATE-TOKEN: $GITLAB_TOKEN" \
            "https://gitlab.com/api/v4/projects/$GITLAB_PROJECT_ID/releases/$RELEASE_TAG" || true

      - name: Create release with links to packages
        run: |
          # Собираем JSON-массив ссылок на пакеты
          LINKS_JSON="["
          for file in artifacts/*; do
            filename=$(basename "$file")
            if [[ $filename =~ ^mihomo-linux-(arm64|amd64|armv7)-v([0-9.]+)\.gz$ ]]; then
              PACKAGE="mihomo"
              VERSION="v${BASH_REMATCH[2]}"
            elif [[ $filename =~ ^shell2http_([0-9.]+)_linux_(arm64|amd64|armv6)\.tar\.gz$ ]]; then
              PACKAGE="shell2http"
              VERSION="v${BASH_REMATCH[1]}"
            else
              continue
            fi
            # Прямая ссылка на пакет
            URL="https://gitlab.com/api/v4/projects/$GITLAB_PROJECT_ID/packages/generic/$PACKAGE/$VERSION/$filename"
            # Для удобства можно добавить ссылку на UI пакетов, но прямая работает для wget
            LINKS_JSON+="{\"name\":\"$filename\",\"url\":\"$URL\",\"link_type\":\"package\"},"
          done
          LINKS_JSON=${LINKS_JSON%,}  # удаляем последнюю запятую
          LINKS_JSON+="]"

          curl -X POST -H "PRIVATE-TOKEN: $GITLAB_TOKEN" -H "Content-Type: application/json" \
            -d "{
              \"name\": \"Mirror of mihomo & shell2http\",
              \"tag_name\": \"$RELEASE_TAG\",
              \"description\": \"Automatically mirrored binaries from GitHub releases\nUpdated: $(date -u +'%Y-%m-%d %H:%M:%S UTC')\",
              \"ref\": \"main\",
              \"assets\": {
                \"links\": $LINKS_JSON
              }
            }" \
            "https://gitlab.com/api/v4/projects/$GITLAB_PROJECT_ID/releases"

      - name: Cleanup
        if: always()
        run: rm -rf artifacts
