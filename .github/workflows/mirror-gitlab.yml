name: Mirror latest binaries to GitLab Releases

on:
  schedule:
    - cron: '0 6 * * *'   # каждый день в 6:00 UTC
  workflow_dispatch:       # ручной запуск

env:
  GITLAB_TOKEN: ${{ secrets.GITLAB_TOKEN }}
  GITLAB_PROJECT_ID: ${{ secrets.GITLAB_PROJECT_ID }}
  RELEASE_TAG: "mirror-latest"

jobs:
  mirror:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download artifacts (mihomo + shell2http)
        run: |
          cat > download.sh << 'EOF'
          #!/bin/bash
          set -e
          mkdir -p artifacts
          cd artifacts

          # ----- mihomo -----
          echo "=== Downloading mihomo ==="
          MIHOMO_JSON=$(curl -s https://api.github.com/repos/MetaCubeX/mihomo/releases/latest)
          for ARCH in arm64 amd64 armv7; do
            FILTER=".assets[] | select(.name | test(\"mihomo-linux-$ARCH-.*\\\\.gz\") and (test(\"-go[0-9]+\") | not)) | .browser_download_url"
            URL=$(echo "$MIHOMO_JSON" | jq -r "$FILTER")
            if [ -n "$URL" ] && [ "$URL" != "null" ]; then
              echo "Downloading mihomo for $ARCH ..."
              wget -q --show-progress "$URL"
            fi
          done

          # ----- shell2http -----
          echo "=== Downloading shell2http ==="
          SHELL2HTTP_JSON=$(curl -s https://api.github.com/repos/msoap/shell2http/releases/latest)
          for ARCH in arm64 amd64 armv6; do
            FILTER=".assets[] | select(.name | test(\"shell2http_.*_linux_$ARCH\\\\.tar\\\\.gz\")) | .browser_download_url"
            URL=$(echo "$SHELL2HTTP_JSON" | jq -r "$FILTER")
            if [ -n "$URL" ] && [ "$URL" != "null" ]; then
              echo "Downloading shell2http for $ARCH ..."
              wget -q --show-progress "$URL"
            fi
          done

          echo "Download completed:"
          ls -la
          EOF
          chmod +x download.sh
          ./download.sh

      - name: Install jq (JSON parser)
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Delete existing release (if any) – to refresh assets
        run: |
          set +e
          curl --fail -X DELETE \
            -H "PRIVATE-TOKEN: $GITLAB_TOKEN" \
            "https://gitlab.com/api/v4/projects/$GITLAB_PROJECT_ID/releases/$RELEASE_TAG"
          set -e

      - name: Create a new release
        run: |
          curl -X POST \
            -H "PRIVATE-TOKEN: $GITLAB_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{
              \"name\": \"Mirror of mihomo & shell2http\",
              \"tag_name\": \"$RELEASE_TAG\",
              \"description\": \"Automatically mirrored binaries from GitHub releases\nUpdated: $(date -u +'%Y-%m-%d %H:%M:%S UTC')\",
              \"ref\": \"main\"
            }" \
            "https://gitlab.com/api/v4/projects/$GITLAB_PROJECT_ID/releases"

      - name: Upload each artifact as a release link (asset)
        run: |
          for file in artifacts/*; do
            filename=$(basename "$file")
            echo "Uploading $filename ..."
            curl -X POST \
              -H "PRIVATE-TOKEN: $GITLAB_TOKEN" \
              -F "file=@$file" \
              -F "name=$filename" \
              -F "url=./uploads/$filename" \
              "https://gitlab.com/api/v4/projects/$GITLAB_PROJECT_ID/releases/$RELEASE_TAG/assets?link_type=package"
          done

      - name: Cleanup
        if: always()
        run: rm -rf artifacts
